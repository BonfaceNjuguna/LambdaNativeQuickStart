name: debian-build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: debian
    runs-on: ubuntu-latest
    container:
      image: debian:stable

    steps:
    - uses: actions/checkout@v4

    - name: install dependencies
      run: |
        apt-get update
        apt-get install -y \
          libasound2-dev ant autoconf automake bc gambc gcc git imagemagick \
          openjdk-17-jdk libtool libxext-dev make libgl1-mesa-dev \
          libglu1-mesa-dev libnetpbm-dev libfindbin-libs-perl libportaudio2 \
          tar tcl-dev texlive unzip wget zip python3 sdkmanager

    - name: Set JAVA_HOME
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        java -version

    - name: Get LambdaNative
      run: |
        git clone https://github.com/part-cw/lambdanative
        cd lambdanative
        git checkout b6e82ee343d8ea3c95e277d7e122baae9a5dc096

    - name: Copy ExpenseTracker app
      run: cp -r ExpenseTracker lambdanative/apps/

    - name: setup android
      run: |
        mkdir -p android-sdk/cmdline-tools/latest
        wget -O android-sdk/cmdline-tools/latest.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -o -d android-sdk/cmdline-tools/latest android-sdk/cmdline-tools/latest.zip
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk "platforms;android-28"
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk "build-tools;29.0.3"
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk "tools"
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk "extras;android;m2repository"
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk "ndk;21.4.7075529"
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk "platform-tools"
        yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk --licenses
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -noprompt -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"

    - name: prepare lambdanative
      working-directory: lambdanative
      run: |
        cp SETUP.template SETUP
        sed -i 's/ANDROIDAPI=21/ANDROIDAPI=28/g' SETUP
        sed -i 's|/usr/local/android-sdk-*|../../android-sdk|g' SETUP
        sed -i 's|/usr/local/android-ndk-*|../../android-sdk/ndk/21.4.7075529|g' SETUP
        echo 'export ANDROID_NDK_ROOT=../../android-sdk/ndk/21.4.7075529' >> SETUP
        echo 'export ANDROID_SDK_ROOT=../../android-sdk' >> SETUP
        echo 'export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH' >> SETUP
        cp PROFILE.template PROFILE
        sed -i 's|SYS_ANDROIDPW="yoursecrethere"|SYS_ANDROIDPW="android"|g' PROFILE

    - name: Fix toolchain path for LambdaNative
      run: |
        mkdir -p /toolchains/llvm/prebuilt
        ln -s $GITHUB_WORKSPACE/android-sdk/ndk/21.4.7075529/toolchains/llvm/prebuilt/linux-x86_64 /toolchains/llvm/prebuilt/linux-x86_64

    - name: Patch missing clang toolchain
      run: |
        if [ ! -f /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang ] && [ -f /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-clang ]; then
          ln -s /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-clang /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang
        fi
        if [ ! -f /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang++ ] && [ -f /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-clang++ ]; then
          ln -s /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-clang++ /toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang++
        fi

    - name: linux builds
      working-directory: lambdanative
      run: |
        ./configure ExpenseTracker --verbose
        make

    - name: Patch wrong clang target name
      working-directory: lambdanative
      run: |
        if [ -f targets/android/build ]; then
          sed -i 's/aarch64-linux-android28-clang/aarch64-linux-android-clang/g' targets/android/build
          sed -i 's/aarch64-linux-android28-clang++/aarch64-linux-android-clang++/g' targets/android/build
        fi

    - name: android builds
      working-directory: lambdanative
      run: |
        sed -i 's/python/python3/g' targets/android/check-tools
        mkdir -p ~/.cache/lambdanative/android/support
        ./configure ExpenseTracker --verbose android debug
        make

    - uses: actions/upload-artifact@v4
      with:
        name: apk
        path: ~/.cache/lambdanative/packages/*.apk