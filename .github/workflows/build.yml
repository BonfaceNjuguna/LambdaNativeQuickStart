name: fedora-build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: fedora
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
    - uses: actions/checkout@v6
    - run: cat /etc/os-release
    - name: install dependencies
      run: |
       dnf -y install alsa-lib-devel ant autoconf automake bc curl gambit-c
       dnf -y install gcc-14 git grep ImageMagick-devel java-25-openjdk-devel
       dnf -y install libtool libXext-devel make mesa-libGL-devel
       dnf -y install mesa-libGLU-devel netpbm-devel patch perl-FindBin
       dnf -y install portaudio python3-sdkmanager sed tar tcl-devel texlive
       dnf -y install which wget zip
       dnf -y install m4 pkgconf-pkg-config gettext-devel autoconf-archive
    - name: Get LambdaNative
      run: |
       git clone https://github.com/part-cw/lambdanative
       cd lambdanative
       git checkout b6e82ee343d8ea3c95e277d7e122baae9a5dc096
       cd modules
       rm -rf gps
       git clone https://github.com/rabsss/gps_module gps
    - name: setup android
      run: |
       # https://stackoverflow.com/a/77215395
       # https://computingforgeeks.com/install-and-use-android-studio-on-fedora/
       mkdir -p /home/build/android-sdk
       export ANDROID_HOME=/home/build/android-sdk
       echo yes | sdkmanager --sdk_root=/home/build/android-sdk "platforms;android-28"
       echo yes | sdkmanager --sdk_root=/home/build/android-sdk "build-tools;29.0.3"
       echo yes | sdkmanager --sdk_root=/home/build/android-sdk "tools"
       echo yes | sdkmanager --sdk_root=/home/build/android-sdk "extras;android;m2repository"
       echo yes | sdkmanager --sdk_root=/home/build/android-sdk "ndk;21.4.7075529"
       echo yes | sdkmanager --sdk_root=/home/build/android-sdk "platform-tools"
       echo yes | sdkmanager --sdk_root=/home/build/android-sdk --licenses
       # https://coderwall.com/p/r09hoq/android-generate-release-debug-keystores
       # https://stackoverflow.com/a/13578480
       keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -noprompt -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"
    - name: prepare lambdanative
      working-directory: lambdanative
      run : |
       cp SETUP.template SETUP
       sed -i 's/ANDROIDAPI=21/ANDROIDAPI=28/g' SETUP
       sed -i 's|/usr/local/android-sdk-*|/home/build/android-sdk|g' SETUP
       sed -i 's|/usr/local/android-ndk-*|/home/build/android-sdk/ndk/21.4.7075529|g' SETUP
       echo 'export ANDROID_NDK_ROOT=/home/build/android-sdk/ndk/21.4.7075529' >> SETUP
       echo 'export ANDROID_SDK_ROOT=/home/build/android-sdk' >> SETUP
       cp PROFILE.template PROFILE
       sed -i 's|SYS_ANDROIDPW="yoursecrethere"|SYS_ANDROIDPW="android"|g' PROFILE
       sed -i 's|SYS_CC="gcc $SYS|SYS_CC="gcc-14 $SYS|g' targets/linux/host_linux
       sed -i 's|SYS_CXX="g++ $SYS|SYS_CXX="g++-13 $SYS|g' targets/linux/host_linux
       sed -i 's|gcc -Werror|gcc-14 -Werror|g' targets/linux/check-libraries
    - name: Patch clipboard module bug
      working-directory: lambdanative
      run: |
        # Fix clipboard_clear function signature mismatch
        # Show original content
        echo "=== Original clipboard.scm ==="
        cat -A modules/clipboard/clipboard.scm
        # Use perl with slurp mode to handle multiline
        perl -i -0777 -pe 's/\(c-lambda\s*\(int\)\s*int\s*"clipboard_clear"\)/(c-lambda () int "clipboard_clear")/gs' modules/clipboard/clipboard.scm
        echo "=== Patched clipboard.scm ==="
        cat modules/clipboard/clipboard.scm
    - name: Copy ExpenseTracker app
      run: cp -r ExpenseTracker lambdanative/apps/
    - name: Linux configure (fetch deps)
      working-directory: lambdanative
      run: |
        ./configure ExpenseTracker --verbose

    - name: Linux build (first pass to unpack deps)
      working-directory: lambdanative
      run: |
        make || true

    - name: Fix libtool tag issue (jpeg-6b) if present
      working-directory: lambdanative
      run: |
        set -euxo pipefail
        JPEG_DIR="$HOME/.lambdanative/tmp_install/jpeg-6b"
        if [ ! -d "$JPEG_DIR" ]; then
          echo "jpeg-6b still not present; nothing to patch."
          exit 0
        fi
        cd "$JPEG_DIR"

        # Replace ./libtool with a wrapper that always passes --tag=CC
        # The real issue: libtool can't infer the tag when CC contains flags
        printf '#!/bin/sh\nexec /usr/bin/libtool --tag=CC "$@"\n' > ./libtool
        chmod +x ./libtool

        # Rebuild jpeg-6b with the fixed libtool
        gmake clean || true
        gmake -j9 libjpeg.a

        # Install to the LambdaNative prefix
        PREFIX="$HOME/.cache/lambdanative/linux"
        mkdir -p "$PREFIX/lib" "$PREFIX/include"
        cp libjpeg.a "$PREFIX/lib/"
        cp jpeglib.h jconfig.h jmorecfg.h jerror.h "$PREFIX/include/"

    - name: Linux build (second pass)
      working-directory: lambdanative
      run: |
        make
    - name: Patch clang toolchain for Android
      run: |
        NDK_TOOLCHAIN=/home/build/android-sdk/ndk/21.4.7075529/toolchains/llvm/prebuilt/linux-x86_64/bin
        if [ ! -f "$NDK_TOOLCHAIN/aarch64-linux-android28-clang" ] && [ -f "$NDK_TOOLCHAIN/aarch64-linux-android-clang" ]; then
          ln -s "$NDK_TOOLCHAIN/aarch64-linux-android-clang" "$NDK_TOOLCHAIN/aarch64-linux-android28-clang"
        fi
        if [ ! -f "$NDK_TOOLCHAIN/aarch64-linux-android28-clang++" ] && [ -f "$NDK_TOOLCHAIN/aarch64-linux-android-clang++" ]; then
          ln -s "$NDK_TOOLCHAIN/aarch64-linux-android-clang++" "$NDK_TOOLCHAIN/aarch64-linux-android28-clang++"
        fi
        if [ ! -f "$NDK_TOOLCHAIN/armv7a-linux-androideabi28-clang" ] && [ -f "$NDK_TOOLCHAIN/armv7a-linux-androideabi-clang" ]; then
          ln -s "$NDK_TOOLCHAIN/armv7a-linux-androideabi-clang" "$NDK_TOOLCHAIN/armv7a-linux-androideabi28-clang"
        fi
        if [ ! -f "$NDK_TOOLCHAIN/armv7a-linux-androideabi28-clang++" ] && [ -f "$NDK_TOOLCHAIN/armv7a-linux-androideabi-clang++" ]; then
          ln -s "$NDK_TOOLCHAIN/armv7a-linux-androideabi-clang++" "$NDK_TOOLCHAIN/armv7a-linux-androideabi28-clang++"
        fi
    - name: Android build
      working-directory: lambdanative
      run: |
        sed -i 's/python/python3/g' targets/android/check-tools
        mkdir -p ~/.cache/lambdanative/android/support
        ./configure ExpenseTracker --verbose android debug
        make || { echo "Android build failed"; cat config.log; exit 1; }
    - name: Debug APK output
      run: |
        ls -R ~/.cache/lambdanative/packages/
        find $GITHUB_WORKSPACE -name "*.apk"

    - uses: actions/upload-artifact@v7
      with:
        name: apk
        path: ~/.cache/lambdanative/packages/*.apk
